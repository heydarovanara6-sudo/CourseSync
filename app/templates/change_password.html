{% extends "base.html" %}
{% from "_macros.html" import flashes %}
{% block title %}Change password — CourseSync{% endblock %}

{% block content %}
<div class="mb-8">
  <p class="font-mono text-xs uppercase tracking-widest text-brass-600 mb-1">Account</p>
  <h1 class="font-display text-3xl">Change password</h1>
</div>

<div class="max-w-sm">
  {{ flashes() }}

  <form method="POST" action="{{ url_for('auth.change_password') }}" class="card p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ink-700 mb-1.5">Current password</label>
      <input class="input" type="password" name="current_password" required autofocus />
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ink-700 mb-1.5">New password</label>
      <input class="input" type="password" name="new_password" required minlength="6" />
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ink-700 mb-1.5">Confirm new password</label>
      <input class="input" type="password" name="confirm_password" required minlength="6" />
    </div>
    <button type="submit" class="btn btn-primary w-full">Update password</button>
  </form>
</div>
{% endblock %}
