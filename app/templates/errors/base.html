<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Error — CourseSync{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: { 900: '#14261f', 700: '#22443a' },
            moss: { 500: '#5b6e5a' },
            paper: { DEFAULT: '#f1f4ea' },
            brass: { 500: '#c4934a', 600: '#a97934', ink: '#4a3416' },
          },
          fontFamily: {
            display: ['Fraunces', 'ui-serif', 'serif'],
            sans: ['IBM Plex Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="h-full bg-paper">
  <div class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md text-center">
      <div class="flex justify-center mb-6">
        <div class="stamp-row">
          <div class="stamp stamp--filled">✓</div>
          <div class="stamp stamp--empty">?</div>
          <div class="stamp stamp--empty">?</div>
        </div>
      </div>
      <p class="font-mono text-xs uppercase tracking-widest text-brass-600 mb-3">Error {% block code %}{% endblock %}</p>
      <h1 class="font-display text-4xl mb-4">{% block heading %}Something went wrong{% endblock %}</h1>
      <p class="text-moss-500 text-sm mb-8">{% block message %}Please try again.{% endblock %}</p>
      <a href="/" class="btn btn-dark">Back to CourseSync</a>
    </div>
  </div>
</body>
</html>
